name: Build Web, Android & iOS

on:
  push:
   branches: [main]
  workflow_dispatch:

jobs:
 build-web:
   runs-on: ubuntu-latest
   steps:
      - name: Checkout code
       uses: actions/checkout@v4
      
      - name: Setup Node.js 20
       uses: actions/setup-node@v4
       with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
       run: npm ci
      
      - name: Build Next.js project
       run: npm run build
      
      - name: Upload web artifact
       uses: actions/upload-artifact@v4
       with:
         name: web-build
          path: out/

 build-android:
   runs-on: ubuntu-latest
   needs: build-web
   steps:
      - name: Checkout code
       uses: actions/checkout@v4
      
      - name: Setup Node.js 20
       uses: actions/setup-node@v4
       with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Java 17
       uses: actions/setup-java@v4
       with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
       uses: android-actions/setup-android@v3
      
      - name: Install dependencies
       run: npm ci
      
      - name: Build Next.js project
       run: npm run build
      
      - name: Add Android platform
       run: npx cap add android || true
      
      - name: Sync Capacitor
       run: npx cap sync android
      
      - name: Build Android APK
       run: |
         cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload Android APK
       uses: actions/upload-artifact@v4
       with:
         name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

 build-ios:
   runs-on: macos-latest
   needs: build-web
   steps:
      - name: Checkout code
       uses: actions/checkout@v4
      
      - name: Setup Node.js 20
       uses: actions/setup-node@v4
       with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
       run: npm ci
      
      - name: Build Next.js project
       run: npm run build
      
      - name: Add iOS platform
       run: npx cap add ios || true
      
      - name: Sync Capacitor
       run: npx cap sync ios
      
      - name: Install CocoaPods
       run: |
         cd ios/App
          pod install
      
      - name: Build iOS app
       run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App\
            -configuration Debug \
            -sdk iphonesimulator\
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Create iOS artifact directory
       run: mkdir -p ios/artifacts
      
      - name: Package iOS build
       run: |
         cp -r ios/build/Build/Products/Debug-iphonesimulator/App.app ios/artifacts/
         cd ios/artifacts
         zip -r ios-build.zip App.app
      
      - name: Upload iOS build
       uses: actions/upload-artifact@v4
       with:
         name: ios-build
          path: ios/artifacts/ios-build.zip
