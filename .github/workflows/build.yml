name: Build Web, Android & iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: out/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm install
      - run: npm run build
      - run: npx cap add android || true
      - run: npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build
      - name: Generate iOS project
        run: |
          rm -rf ios
          npx cap add ios 2>&1
          echo "--- cap add done, exit code: $?"
          npx cap sync ios 2>&1
          echo "--- cap sync done"
      - name: Debug filesystem
        run: |
          echo "=== repo root ==="
          ls -la
          echo "=== ios/ ==="
          ls -la ios/ || echo "ios/ does not exist"
          echo "=== ios/App/ ==="
          ls -la ios/App/ || echo "ios/App/ does not exist"
          echo "=== find Podfile ==="
          find . -name "Podfile" 2>/dev/null || echo "No Podfile found anywhere"
          echo "=== capacitor.config ==="
          cat capacitor.config.ts || cat capacitor.config.json || echo "no capacitor config found"
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install
      - name: Build iOS
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO
      - name: Package iOS build
        run: |
          cd ios/build/Build/Products/Debug-iphonesimulator
          zip -r ios-app.zip App.app
      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build/Build/Products/Debug-iphonesimulator/ios-app.zip